<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1672 941" width="1672" height="941">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2a6"/>
      <stop offset="0.28" stop-color="#d59724"/>
      <stop offset="0.55" stop-color="#7a4207"/>
      <stop offset="0.78" stop-color="#ffc94d"/>
      <stop offset="1" stop-color="#5a2a05"/>
    </linearGradient>
    <radialGradient id="emerald" cx="50%" cy="45%" r="75%">
      <stop offset="0" stop-color="#0b4b2a"/>
      <stop offset="0.62" stop-color="#062817"/>
      <stop offset="1" stop-color="#020a06"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.75"/>
    </filter>
    <filter id="goldGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#ffdc6a" flood-opacity="0.8"/>
    </filter>
    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 0h80v80H0z" fill="#042414"/>
      <path d="M8 23c20-16 46 12 66-4M-10 61c30-20 58 18 92-8" fill="none" stroke="#0e5a32" stroke-width="1" opacity="0.16"/>
    </pattern>
  </defs>

  <rect width="1672" height="941" fill="transparent"/>

  <!-- Left key counter -->
  <g filter="url(#softShadow)">
    <rect x="54" y="315" width="170" height="250" rx="18" fill="url(#emerald)" stroke="url(#gold)" stroke-width="7"/>
    <rect x="68" y="329" width="142" height="178" rx="10" fill="#03150d" stroke="url(#gold)" stroke-width="3" opacity="0.95"/>
    <rect x="76" y="513" width="126" height="40" rx="6" fill="#05190f" stroke="url(#gold)" stroke-width="3"/>
    <text x="139" y="546" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#fff0a8">0</text>
    <g transform="translate(93 353) rotate(-33 52 62)" filter="url(#goldGlow)">
      <circle cx="58" cy="40" r="22" fill="none" stroke="url(#gold)" stroke-width="9"/>
      <circle cx="58" cy="40" r="10" fill="#00a86b" stroke="#fff2a6" stroke-width="3"/>
      <path d="M58 62 L58 155" stroke="url(#gold)" stroke-width="13" stroke-linecap="round"/>
      <path d="M58 118 L86 118 M58 139 L76 139" stroke="url(#gold)" stroke-width="11" stroke-linecap="round"/>
      <path d="M39 22 C50 6 70 6 81 22 M34 41 C20 34 20 51 34 44 M82 41 C96 34 96 51 82 44" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    </g>
    <path d="M88 312c20-34 82-34 102 0" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <path d="M88 568c20 34 82 34 102 0" fill="none" stroke="url(#gold)" stroke-width="5"/>
  </g>

  <!-- Main 5x5 frame -->
  <g filter="url(#softShadow)">
    <rect x="272" y="92" width="1264" height="756" rx="8" fill="url(#emerald)" stroke="url(#gold)" stroke-width="10"/>
    <rect x="288" y="108" width="1232" height="724" rx="4" fill="url(#grain)" opacity="0.96"/>
    <rect x="272" y="92" width="1264" height="756" rx="8" fill="none" stroke="#ffe486" stroke-width="2"/>

    <!-- Vertical grid lines: 5 equal columns -->
    <g stroke="url(#gold)" stroke-linecap="round" filter="url(#goldGlow)">
      <line x1="524.8" y1="105" x2="524.8" y2="835" stroke-width="5"/>
      <line x1="777.6" y1="105" x2="777.6" y2="835" stroke-width="5"/>
      <line x1="1030.4" y1="105" x2="1030.4" y2="835" stroke-width="5"/>
      <line x1="1283.2" y1="105" x2="1283.2" y2="835" stroke-width="5"/>
    </g>

    <!-- Horizontal grid lines: 5 equal rows -->
    <g stroke="url(#gold)" stroke-linecap="round" filter="url(#goldGlow)">
      <line x1="285" y1="243.2" x2="1523" y2="243.2" stroke-width="5"/>
      <line x1="285" y1="394.4" x2="1523" y2="394.4" stroke-width="5"/>
      <line x1="285" y1="545.6" x2="1523" y2="545.6" stroke-width="5"/>
      <line x1="285" y1="696.8" x2="1523" y2="696.8" stroke-width="5"/>
    </g>

    <!-- Emerald joints -->
    <g filter="url(#goldGlow)">
      <g fill="#009b67" stroke="url(#gold)" stroke-width="4">
        <path d="M524.8 243.2 l15 15 l-15 15 l-15 -15z"/><path d="M777.6 243.2 l15 15 l-15 15 l-15 -15z"/><path d="M1030.4 243.2 l15 15 l-15 15 l-15 -15z"/><path d="M1283.2 243.2 l15 15 l-15 15 l-15 -15z"/>
        <path d="M524.8 394.4 l15 15 l-15 15 l-15 -15z"/><path d="M777.6 394.4 l15 15 l-15 15 l-15 -15z"/><path d="M1030.4 394.4 l15 15 l-15 15 l-15 -15z"/><path d="M1283.2 394.4 l15 15 l-15 15 l-15 -15z"/>
        <path d="M524.8 545.6 l15 15 l-15 15 l-15 -15z"/><path d="M777.6 545.6 l15 15 l-15 15 l-15 -15z"/><path d="M1030.4 545.6 l15 15 l-15 15 l-15 -15z"/><path d="M1283.2 545.6 l15 15 l-15 15 l-15 -15z"/>
        <path d="M524.8 696.8 l15 15 l-15 15 l-15 -15z"/><path d="M777.6 696.8 l15 15 l-15 15 l-15 -15z"/><path d="M1030.4 696.8 l15 15 l-15 15 l-15 -15z"/><path d="M1283.2 696.8 l15 15 l-15 15 l-15 -15z"/>
      </g>
    </g>

    <!-- Ornate corners and center ornaments -->
    <g fill="url(#gold)" stroke="#fff0a6" stroke-width="1.2" filter="url(#goldGlow)">
      <path d="M264 84 h70 l-22 22 h-26 v26 l-22 22z"/><path d="M1544 84 h-70 l22 22 h26 v26 l22 22z"/>
      <path d="M264 856 h70 l-22-22 h-26 v-26 l-22-22z"/><path d="M1544 856 h-70 l22-22 h26 v-26 l22-22z"/>
      <path d="M904 82 c20 20 42 20 62 0 c-12 28-42 36-62 58 c-20-22-50-30-62-58 c20 20 42 20 62 0z"/>
      <path d="M904 858 c20-20 42-20 62 0 c-12-28-42-36-62-58 c-20 22-50 30-62 58 c20-20 42-20 62 0z"/>
    </g>
  </g>
</svg>