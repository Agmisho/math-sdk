name: The Inheritance release proof

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"
  push:
    paths:
      - ".github/workflows/the-inheritance-release.yml"
      - "games/2_0_The_Inheritance/**"
      - "tools/the-inheritance-*/**"
      - "web-sdk/apps/the-inheritance/**"
      - "web-sdk/packages/**"
      - "web-sdk/package.json"
      - "web-sdk/pnpm-lock.yaml"
      - "web-sdk/pnpm-workspace.yaml"
      - "web-sdk/turbo.json"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/the-inheritance-release.yml"
      - "games/2_0_The_Inheritance/**"
      - "tools/the-inheritance-*/**"
      - "web-sdk/apps/the-inheritance/**"
      - "web-sdk/packages/**"
      - "web-sdk/package.json"
      - "web-sdk/pnpm-lock.yaml"
      - "web-sdk/pnpm-workspace.yaml"
      - "web-sdk/turbo.json"
      - "requirements.txt"

jobs:
  release-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install Math SDK dependencies
        run: |
          set -o pipefail
          mkdir -p artifacts
          python -m pip install --upgrade pip 2>&1 | tee artifacts/pip-bootstrap.log
          python -m pip install -r requirements.txt 2>&1 | tee artifacts/math-dependency-install.log

      - name: Install Web SDK dependencies
        working-directory: web-sdk
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Run The Inheritance release proof
        run: python tools/the-inheritance-release-check.py

      - name: Install Playwright Chromium
        working-directory: web-sdk
        run: pnpm --filter the-inheritance exec playwright install --with-deps chromium

      - name: Run The Inheritance browser smoke QA
        working-directory: web-sdk
        env:
          NPM_CONFIG_NODE_LINKER: hoisted
        run: |
          pnpm --filter the-inheritance e2e-smoke
          pnpm --filter the-inheritance e2e-mobile

      - name: Write machine-readable release summary
        if: success()
        run: python games/2_0_The_Inheritance/tools/write_ci_summary.py

      - name: Upload release proof summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: the-inheritance-release-proof
          path: |
            artifacts/the-inheritance-ci-summary.json
            artifacts/pip-bootstrap.log
            artifacts/math-dependency-install.log
            web-sdk/apps/the-inheritance/build-release/**
            web-sdk/apps/the-inheritance/playwright-report/**
            web-sdk/apps/the-inheritance/test-results/**
          if-no-files-found: warn
