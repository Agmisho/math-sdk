name: The Inheritance release proof

on:
  push:
    paths:
      - ".github/workflows/the-inheritance-release.yml"
      - "games/2_0_The_Inheritance/**"
      - "tools/the-inheritance-*/**"
      - "web-sdk/apps/the-inheritance/**"
      - "web-sdk/packages/**"
      - "web-sdk/package.json"
      - "web-sdk/pnpm-lock.yaml"
      - "web-sdk/pnpm-workspace.yaml"
      - "web-sdk/turbo.json"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/the-inheritance-release.yml"
      - "games/2_0_The_Inheritance/**"
      - "tools/the-inheritance-*/**"
      - "web-sdk/apps/the-inheritance/**"
      - "web-sdk/packages/**"
      - "web-sdk/package.json"
      - "web-sdk/pnpm-lock.yaml"
      - "web-sdk/pnpm-workspace.yaml"
      - "web-sdk/turbo.json"
      - "requirements.txt"

jobs:
  release-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install Math SDK dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Web SDK dependencies
        working-directory: web-sdk
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Run The Inheritance release proof
        run: python tools/the-inheritance-release-check.py
