name: The Inheritance release proof

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"
  push:
    paths:
      - ".github/workflows/the-inheritance-release.yml"
      - "games/2_0_The_Inheritance/**"
      - "tools/the-inheritance-*.py"
      - "tools/the-inheritance-local-rgs/**"
      - "tools/assemble-the-inheritance-submission.py"
      - "web-sdk/apps/the-inheritance/**"
      - "web-sdk/packages/**"
      - "web-sdk/package.json"
      - "web-sdk/pnpm-lock.yaml"
      - "web-sdk/pnpm-workspace.yaml"
      - "web-sdk/turbo.json"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/the-inheritance-release.yml"
      - "games/2_0_The_Inheritance/**"
      - "tools/the-inheritance-*.py"
      - "tools/the-inheritance-local-rgs/**"
      - "tools/assemble-the-inheritance-submission.py"
      - "web-sdk/apps/the-inheritance/**"
      - "web-sdk/packages/**"
      - "web-sdk/package.json"
      - "web-sdk/pnpm-lock.yaml"
      - "web-sdk/pnpm-workspace.yaml"
      - "web-sdk/turbo.json"
      - "requirements.txt"

concurrency:
  group: the-inheritance-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release-proof:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      THE_INHERITANCE_RELEASE_BUILD_DIR: ${{ github.workspace }}/web-sdk/apps/the-inheritance/build-release/ci-rtp_96
      PUBLIC_THE_INHERITANCE_RTP: "0.96"
      THE_INHERITANCE_RTP: "96"
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"

      - name: Install Math SDK dependencies
        timeout-minutes: 8
        run: |
          mkdir -p artifacts
          set +e
          python -m pip install --upgrade pip > artifacts/pip-bootstrap.log 2>&1
          bootstrap_status=$?
          python -m pip install -r requirements.txt > artifacts/math-dependency-install.log 2>&1
          dependency_status=$?
          cat artifacts/pip-bootstrap.log
          cat artifacts/math-dependency-install.log
          if [ $bootstrap_status -ne 0 ] || [ $dependency_status -ne 0 ]; then
            exit 1
          fi

      - name: Install Web SDK dependencies
        timeout-minutes: 10
        working-directory: web-sdk
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web-sdk/pnpm-lock.yaml') }}

      - name: Run The Inheritance release proof
        timeout-minutes: 20
        run: |
          mkdir -p artifacts
          set +e
          python tools/the-inheritance-release-proof-v2.py > artifacts/release-proof.log 2>&1
          status=$?
          cat artifacts/release-proof.log
          exit $status

      - name: Install Playwright Chromium
        timeout-minutes: 10
        working-directory: web-sdk
        run: |
          set +e
          pnpm --filter the-inheritance exec playwright install --with-deps chromium > ../artifacts/playwright-install.log 2>&1
          status=$?
          cat ../artifacts/playwright-install.log
          exit $status

      - name: Run The Inheritance browser smoke QA
        timeout-minutes: 12
        working-directory: web-sdk
        env:
          NPM_CONFIG_NODE_LINKER: hoisted
          THE_INHERITANCE_RTP: "96"
          THE_INHERITANCE_E2E_STATIC_DIR: ${{ github.workspace }}/web-sdk/apps/the-inheritance/build-release/ci-rtp_96
        run: |
          set +e
          pnpm --filter the-inheritance e2e-smoke > ../artifacts/browser-smoke.log 2>&1
          desktop_status=$?
          pnpm --filter the-inheritance e2e-mobile >> ../artifacts/browser-smoke.log 2>&1
          mobile_status=$?
          cat ../artifacts/browser-smoke.log
          if [ $desktop_status -ne 0 ] || [ $mobile_status -ne 0 ]; then
            exit 1
          fi

      - name: Write machine-readable release summary
        timeout-minutes: 3
        run: python games/2_0_The_Inheritance/tools/write_ci_summary.py

      - name: Assemble Stake submission bundle
        timeout-minutes: 5
        run: python tools/assemble-the-inheritance-submission.py

      - name: Upload Stake submission proof
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: the-inheritance-stake-submission-rtp96
          path: |
            artifacts/the-inheritance-submission-rtp96/**
            artifacts/the-inheritance-ci-summary.json
            artifacts/pip-bootstrap.log
            artifacts/math-dependency-install.log
            artifacts/release-proof.log
            artifacts/playwright-install.log
            artifacts/browser-smoke.log
            web-sdk/apps/the-inheritance/playwright-report/**
            web-sdk/apps/the-inheritance/test-results/**
          if-no-files-found: warn
